<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tienda PC Custom</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f5f5f5;
}

header {
    background: #111;
    color: white;
    padding: 15px;
    text-align: center;
}

.search {
    text-align: center;
    padding: 10px;
}

.search input {
    width: 50%;
    padding: 8px;
    border-radius: 5px;
    border: 1px solid #ccc;
}

.container {
    display: flex;
    padding: 20px;
    gap: 20px;
}

.productos {
    flex: 3;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 20px;
}

.producto {
    background: white;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    text-align: center;
}

button {
    background: #007bff;
    color: white;
    border: none;
    padding: 8px;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #0056b3;
}

.carrito {
    flex: 1;
    background: white;
    padding: 15px;
    border-radius: 10px;
}

.item {
    display: flex;
    justify-content: space-between;
    margin-bottom: 8px;
}

.remove {
    color: red;
    cursor: pointer;
}

.total {
    font-weight: bold;
    margin-top: 10px;
}

.checkout {
    margin-top: 10px;
    width: 100%;
    background: green;
}
</style>
</head>

<body>

<header>
    <h1>🖥️ Tienda PC Custom</h1>
</header>

<div class="search">
    <input type="text" placeholder="Buscar producto..." onkeyup="filtrar(this.value)">
</div>

<div class="container">

    <div class="productos" id="productos"></div>

    <div class="carrito">
        <h2>🛒 Carrito</h2>
        <div id="lista"></div>
        <div class="total" id="total">Total: $0</div>
        <button class="checkout" onclick="comprar()">Finalizar compra</button>
    </div>

</div>

<script>
const productos = [
    {nombre: "Ryzen 5", precio: 200},
    {nombre: "RTX 3060", precio: 400},
    {nombre: "RAM 16GB", precio: 80},
    {nombre: "SSD 1TB", precio: 120},
    {nombre: "Motherboard B450", precio: 150},
    {nombre: "Fuente 600W", precio: 90}
];

let carrito = [];

function renderProductos(lista) {
    const cont = document.getElementById("productos");
    cont.innerHTML = "";

    lista.forEach(p => {
        cont.innerHTML += `
            <div class="producto">
                <h3>${p.nombre}</h3>
                <p>$${p.precio}</p>
                <button onclick="agregar('${p.nombre}', ${p.precio})">Agregar</button>
            </div>
        `;
    });
}

function agregar(nombre, precio) {
    const item = carrito.find(p => p.nombre === nombre);

    if (item) {
        item.cantidad++;
    } else {
        carrito.push({nombre, precio, cantidad: 1});
    }

    renderCarrito();
}

function eliminar(nombre) {
    carrito = carrito.filter(p => p.nombre !== nombre);
    renderCarrito();
}

function renderCarrito() {
    const lista = document.getElementById("lista");
    lista.innerHTML = "";

    let total = 0;

    carrito.forEach(p => {
        total += p.precio * p.cantidad;

        lista.innerHTML += `
            <div class="item">
                <span>${p.nombre} x${p.cantidad}</span>
                <span>$${p.precio * p.cantidad}</span>
                <span class="remove" onclick="eliminar('${p.nombre}')">❌</span>
            </div>
        `;
    });

    document.getElementById("total").innerText = "Total: $" + total;
}

function comprar() {
    if (carrito.length === 0) {
        alert("El carrito está vacío 😢");
        return;
    }

    alert("Compra realizada con éxito 🧾✨");
    carrito = [];
    renderCarrito();
}

function filtrar(texto) {
    const filtrados = productos.filter(p =>
        p.nombre.toLowerCase().includes(texto.toLowerCase())
    );

    renderProductos(filtrados);
}

// inicial
renderProductos(productos);
</script>

</body>
</html>
